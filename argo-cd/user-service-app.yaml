apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: user-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/BabaFakruddin40/devsecops-azure-cicd.git
    targetRevision: main
    path: k8s-manifests
    kustomize:
      patches:
        - target:
            kind: Deployment
            name: user-service
          patch: |-
            - op: replace
              path: /spec/template/spec/containers/0/image
              value: devsecopsacr28032026.azurecr.io/user-service:latest
  destination:
    server: https://kubernetes.default.svc
    namespace: microservices
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true